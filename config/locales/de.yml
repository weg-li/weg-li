    steps:
      photos:
        title: Erfassen
        description: Mache ein oder mehrere Beweisfotos, die den Verstoß klar dokumentieren, und lade sie hoch. Das Nummernschild sollte auf den Fotos gut zu erkennen sein. Erstelle eine neue Meldung pro Fahrzeug und vermeide es möglichst, Fotos mit Passanten und Kennzeichen Unbeteiligter zu machen.
      infos:
        title: Beschreiben
        description: Um mit Hilfe der Meldung eine Anzeige zu erstatten, werden noch zusätzliche Informationen benötigt. Neben Zeit und Ort des Verstoßes müssen auch noch Details zum Fahrzeug angegeben werden. Vorschläge für diese Informationen werden automatisch aus den Beweisfotos ermittelt.
      charges:
        title: Melden
        description: Aus den Daten kann direkt eine Anzeige erstattet werden, die dann an die zuständige Stelle gesendet wird. Alle Meldungen werden zudem anonymisiert auf der öffentlich erreichbaren weg.li Karte angezeigt.
    callouts:
      send_email:
        hint: 'Erstatte die Anzeige direkt per E-Mail, Du erhältst eine Kopie in CC.'
        title: 'Anzeige per E-Mail'
        text: 'Ist eine Anzeige einmal erstattet worden, so wird sie verfolgt und kann nicht wieder zurückgenommen werden. Anzeigen sollten niemals leichtfertig und nur mit begründetem Verdacht gemeldet werden.'
      copy_link:
        hint: 'Per <em>copy &amp; paste</em> den Link zur Meldung z.B. auf Social Media teilen.'
        title: 'Copy &amp; Paste'
        text: 'Der Link zur Meldung wird in Deine Zwischenablage kopiert. Einfügen mit <code>CMD+V</code> auf Mac oder <code>CTRL+V</code> auf Windows, lange Antippen und kopieren für Touch.'
